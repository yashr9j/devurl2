<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Aurum — Fine Dining & Rare Spirits</title>
<meta name="description" content="Aurum is an exotic fine-dining restaurant born from fire, rare spices, and the obsessive craft of Chef Kaveh Rashidian.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- CURSOR -->
<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- MOBILE MENU OVERLAY -->
<div id="mobile-menu"></div>

<!-- NAV -->
<header id="nav"></header>

<!-- HERO -->
<section id="hero">
  <div class="hero-bg"></div>
  <div class="hero-bg-img"></div>
  <div class="hero-lines"></div>
  <div class="hero-content" id="hero-content"></div>
  <div class="hero-scroll">
    <span>Scroll</span>
    <div class="scroll-line"></div>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="section-inner" id="about-inner"></div>
</section>

<!-- DIVIDER -->
<div class="divider"><div class="divider-line"></div><div class="divider-icon">✦</div><div class="divider-line"></div></div>

<!-- MENU -->
<section id="menu">
  <div class="section-inner" id="menu-inner"></div>
</section>

<!-- GALLERY -->
<section id="gallery">
  <div class="section-inner" id="gallery-inner"></div>
</section>

<!-- EXPERIENCE -->
<section id="experience">
  <div class="section-inner" id="exp-inner"></div>
</section>

<!-- DIVIDER -->
<div class="divider"><div class="divider-line"></div><div class="divider-icon">◆</div><div class="divider-line"></div></div>

<!-- EVENTS -->
<section id="events">
  <div class="section-inner" id="events-inner"></div>
</section>

<!-- TESTIMONIALS -->
<section id="testimonials">
  <div class="section-inner" id="testi-inner"></div>
</section>

<!-- RESERVATION -->
<section id="reservation">
  <div class="res-container" id="res-inner"></div>
</section>

<!-- FOOTER -->
<footer id="footer-inner"></footer>

<!-- DATA -->
<script src="data-hero.js"></script>
<script src="data-about.js"></script>
<script src="data-menu.js"></script>
<script src="data-gallery.js"></script>
<script src="data-experience.js"></script>
<script src="data-footer.js"></script>
<script src="data.js"></script>

<!-- APP -->
<script src="app.js"></script>
</body>
</html>
